<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>18th Birthday</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #f5f5f5; color: #222; overflow-x: hidden; }

    section { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; }

    /* HERO */
    .hero {
      position: relative;
      background: url('your-collage.jpg') center/cover no-repeat;
      color: white;
      text-align: center;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      font-weight: 400;
    }

    /* CARD SECTION */
    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 700px;
    }

    /* POLAROID GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .polaroid {
      background: white;
      padding: 10px 10px 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      transform: rotate(-2deg);
      transition: 0.3s;
    }
    .polaroid:hover { transform: scale(1.05) rotate(0deg); }
    .polaroid img { width: 100%; border-radius: 6px; }

    /* FINAL */
    .final {
      background: linear-gradient(135deg, #111, #333);
      color: white;
      text-align: center;
    }
    .final h2 {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: #ff4d6d;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>3 things you get when you turn 18</h1>
    </div>
  </section>

  <!-- MESSAGE -->
  <section>
    <div class="card">
      <h2>Selamat Ya!</h2>
      <p>
        Kamu berhasil sampai di titik ini. Aku bangga sama kamu. Semoga semua hal baik datang ke hidup kamu.
      </p>
    </div>
  </section>

  <!-- GALLERY -->
  <section>
    <div class="gallery">
      <div class="polaroid"><img src="photo1.jpg" /></div>
      <div class="polaroid"><img src="photo2.jpg" /></div>
      <div class="polaroid"><img src="photo3.jpg" /></div>
      <div class="polaroid"><img src="photo4.jpg" /></div>
    </div>
  </section>

  <!-- FINAL -->
  <section class="final">
    <div>
      <h2>Happy 18th</h2>
      <p>Semoga kamu selalu bahagia dan semua mimpi kamu tercapai.</p>
      <br>
      <button onclick="alert('I love you ❤️')">Click me</button>
    </div>
  </section>

</body>
</html>
